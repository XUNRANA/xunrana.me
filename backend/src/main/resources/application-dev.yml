spring:
  datasource:
    url: jdbc:mysql://localhost:3306/xunrana_blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

# JWT Configuration
jwt:
  secret: xunrana-blog-dev-secret-key-must-be-at-least-64-characters-long-for-hmac-sha256-signing
  access-expiration: 1800000
  refresh-expiration: 604800000

# MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# File Upload
file:
  upload-dir: ./uploads/

# Logging
logging:
  level:
    me.xunrana.blog: debug
    org.springframework.security: debug
